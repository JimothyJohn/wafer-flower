name: CI

# This repo is a CAD/art project: loose Python generator scripts in scripts/
# with no packaged dependency manifest. CI keeps the honest cheap check that
# can genuinely fail — a byte-compile syntax pass over every tracked script.

on:
  push:
    branches: [master, dev]
  pull_request:

permissions: {}

jobs:
  syntax:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Byte-compile Python scripts
        run: python3 -m compileall -q scripts
